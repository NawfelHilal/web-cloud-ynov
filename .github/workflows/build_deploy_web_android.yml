name: build and deploy Web & Android

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ─── Job 1 : Build & Deploy Web sur GitHub Pages ───────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm install

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5

      - name: 🔨 Build web app
        run: npm run predeploy

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          if-no-files-found: error

  # ─── Job 2 : Deploy sur GitHub Pages ────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    needs: build-web
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Job 3 : Build Android avec EAS ─────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 EAS Update Android
        run: eas update --auto --platform android --non-interactive
